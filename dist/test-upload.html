<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片上传测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .preview img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .info {
      background: #f0f5ff;
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      background: #1677ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #40a9ff;
    }
  </style>
</head>
<body>
  <h1>📸 图片上传功能测试</h1>

  <div class="test-section">
    <h2>测试 1: 图片压缩测试</h2>
    <div class="info">
      <strong>测试目的：</strong>验证图片是否被压缩到 800x800 以内
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="preview" id="preview"></div>
    <div id="info" style="margin-top: 10px;"></div>
  </div>

  <div class="test-section">
    <h2>测试 2: 直接访问反馈页面</h2>
    <div class="info">
      <strong>测试步骤：</strong>
      <ol>
        <li>访问 <a href="/feedback" target="_blank">/feedback</a> 页面</li>
        <li>填写反馈类型、内容</li>
        <li>点击"上传"按钮</li>
        <li>选择 1-5 张图片</li>
        <li>验证缩略图是否显示</li>
        <li>验证上传按钮在 5 张后消失</li>
        <li>验证删除功能</li>
        <li>提交反馈</li>
      </ol>
    </div>
    <button onclick="window.open('/feedback', '_blank')">打开反馈页面</button>
  </div>

  <div class="test-section">
    <h2>测试 3: 控制台检查</h2>
    <div class="info">
      <strong>检查项目：</strong>
      <ul>
        <li>打开浏览器控制台（F12）</li>
        <li>查看是否有错误</li>
        <li>查看网络请求中的图片大小</li>
        <li>查看 fileList 状态</li>
      </ul>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput')
    const preview = document.getElementById('preview')
    const info = document.getElementById('info')

    fileInput.addEventListener('change', async (e) => {
      const files = e.target.files
      preview.innerHTML = ''
      info.innerHTML = ''

      if (files.length === 0) return

      info.innerHTML += `<p>选择了 ${files.length} 张图片</p>`

      for (let i = 0; i < files.length; i++) {
        const file = files[i]
        
        // 显示原始信息
        info.innerHTML += `
          <div style="margin: 10px 0; padding: 10px; background: #fff; border-radius: 4px;">
            <strong>图片 ${i + 1}:</strong><br>
            文件名：${file.name}<br>
            原始大小：${(file.size / 1024 / 1024).toFixed(2)} MB<br>
            类型：${file.type}
          </div>
        `

        // 压缩图片
        const compressedFile = await compressImage(file)
        
        info.innerHTML += `
          <div style="margin: 10px 0; padding: 10px; background: #f6ffed; border-radius: 4px; border: 1px solid #b7eb8f;">
            <strong>压缩后:</strong><br>
            压缩大小：${(compressedFile.size / 1024 / 1024).toFixed(2)} MB<br>
            压缩比：${((1 - compressedFile.size / file.size) * 100).toFixed(1)}%<br>
            尺寸：${compressedFile.width} x ${compressedFile.height}
          </div>
        `

        // 显示缩略图
        const img = document.createElement('img')
        img.src = compressedFile.thumbUrl
        preview.appendChild(img)
      }
    })

    // 压缩图片函数（与反馈页面相同逻辑）
    function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader()
        reader.readAsDataURL(file)
        reader.onload = (event) => {
          const img = new Image()
          img.src = event.target.result
          img.onload = () => {
            const canvas = document.createElement('canvas')
            const ctx = canvas.getContext('2d')
            
            const MAX_SIZE = 800
            let width = img.width
            let height = img.height
            
            if (width > height) {
              if (width > MAX_SIZE) {
                height = Math.round((height * MAX_SIZE) / width)
                width = MAX_SIZE
              }
            } else {
              if (height > MAX_SIZE) {
                width = Math.round((width * MAX_SIZE) / height)
                height = MAX_SIZE
              }
            }
            
            canvas.width = width
            canvas.height = height
            ctx.drawImage(img, 0, 0, width, height)
            
            canvas.toBlob(
              (blob) => {
                const compressedFile = new File([blob], file.name, {
                  type: 'image/jpeg',
                  lastModified: Date.now(),
                })
                compressedFile.width = width
                compressedFile.height = height
                compressedFile.thumbUrl = event.target.result
                resolve(compressedFile)
              },
              'image/jpeg',
              0.85
            )
          }
        }
      })
    }
  </script>
</body>
</html>
